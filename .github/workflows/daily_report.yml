name: Generate daily market radar

on:
  schedule:
    # Weekdays at 07:30 London time during GMT. Adjust seasonally if desired.
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily report
        env:
          PYTHONPATH: src
          TRADING212_ENV: ${{ secrets.TRADING212_ENV }}
          TRADING212_API_KEY: ${{ secrets.TRADING212_API_KEY }}
          TRADING212_API_SECRET: ${{ secrets.TRADING212_API_SECRET }}
        run: python -m radar.report --kind daily --refresh-prices

      - name: Commit generated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily market radar report"
          file_pattern: reports data/price_cache
